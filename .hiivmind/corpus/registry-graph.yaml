schema_version: 1

bridges:
  # === Lazy / Deferred Execution ===
  - concept_a: "polars:lazy-evaluation"
    concept_b: "ibis:deferred-execution"
    type: "see-also"
    note: "Both implement deferred query execution for performance — Polars via LazyFrame, Ibis via expression trees compiled to backend-specific SQL/IR"

  - concept_a: "polars:lazy-evaluation"
    concept_b: "narwhals:lazy-support"
    type: "see-also"
    note: "Narwhals wraps Polars LazyFrame as one of its lazy-only backends"

  - concept_a: "ibis:deferred-execution"
    concept_b: "narwhals:lazy-support"
    type: "see-also"
    note: "Ibis is one of Narwhals' lazy-only supported backends"

  # === Expression Systems ===
  - concept_a: "polars:expressions"
    concept_b: "ibis:expression-api"
    type: "see-also"
    note: "Both provide expression DSLs for column operations — Polars native, Ibis backend-portable"

  - concept_a: "polars:expressions"
    concept_b: "narwhals:expression-model"
    type: "see-also"
    note: "Narwhals uses a subset of Polars expression API as its interface model"

  - concept_a: "polars:expressions"
    concept_b: "substrait:expressions"
    type: "see-also"
    note: "Polars expressions are high-level DSL; Substrait expressions are low-level IR for cross-engine interchange"

  - concept_a: "ibis:expression-api"
    concept_b: "substrait:expressions"
    type: "see-also"
    note: "Ibis expressions can compile to Substrait plans via the Substrait producer"

  - concept_a: "narwhals:expression-model"
    concept_b: "ibis:expression-api"
    type: "see-also"
    note: "Both abstract over multiple backends — Narwhals at the dataframe level, Ibis at the SQL engine level"

  # === Type Systems ===
  - concept_a: "polars:data-types"
    concept_b: "ibis:type-system"
    type: "see-also"
    note: "Both define rich type systems — Polars native types, Ibis portable types mapped to backend types"

  - concept_a: "polars:data-types"
    concept_b: "narwhals:type-system"
    type: "see-also"
    note: "Narwhals type system mirrors Polars dtypes for cross-backend compatibility"

  - concept_a: "polars:data-types"
    concept_b: "substrait:type-system"
    type: "see-also"
    note: "Substrait defines the interchange type system; Polars types map to Arrow types which align with Substrait simple types"

  - concept_a: "ibis:type-system"
    concept_b: "substrait:type-system"
    type: "see-also"
    note: "Ibis type system bridges Python types to backend types; Substrait provides the cross-engine type specification"

  - concept_a: "narwhals:type-system"
    concept_b: "ibis:type-system"
    type: "see-also"
    note: "Both provide cross-backend type abstractions at different levels"

  # === SQL ===
  - concept_a: "polars:sql-interface"
    concept_b: "ibis:sql-integration"
    type: "see-also"
    note: "Polars has a SQL context for DataFrames; Ibis compiles expressions to SQL for database backends"

  - concept_a: "polars:sql-interface"
    concept_b: "narwhals:sql-generation"
    type: "see-also"
    note: "Both enable SQL interaction — Polars via SQL context, Narwhals via expression-to-SQL generation"

  - concept_a: "narwhals:sql-generation"
    concept_b: "ibis:sql-integration"
    type: "see-also"
    note: "Both generate SQL from Python expressions, at different abstraction levels"

  # === Arrow / Interop ===
  - concept_a: "polars:arrow-interop"
    concept_b: "substrait:ecosystem"
    type: "see-also"
    note: "Both connect to the Apache Arrow ecosystem — Polars uses Arrow memory format, Substrait plans are consumed by Arrow compute kernels"

  # === Extensibility / UDFs ===
  - concept_a: "polars:plugins-extensibility"
    concept_b: "ibis:udfs"
    type: "see-also"
    note: "Both provide extensibility — Polars via Rust expression/IO plugins, Ibis via Python scalar/aggregate UDFs"

  - concept_a: "substrait:extensions"
    concept_b: "ibis:udfs"
    type: "see-also"
    note: "Substrait defines extension YAML for custom functions; Ibis UDFs are one way those functions get authored"

  # === Streaming ===
  - concept_a: "ibis:streaming"
    concept_b: "polars:distributed-execution"
    type: "see-also"
    note: "Ibis supports streaming backends (Flink, Materialize); Polars Cloud provides distributed batch execution"

  # === Relational Algebra ===
  - concept_a: "polars:transformations"
    concept_b: "substrait:relational-algebra"
    type: "see-also"
    note: "Polars transformations (joins, aggregates) map to Substrait logical relations (Join, Aggregate, Filter)"

  # === Backend Portability ===
  - concept_a: "ibis:backend-portability"
    concept_b: "narwhals:dataframe-agnostic"
    type: "see-also"
    note: "Both solve portability — Ibis across SQL engines, Narwhals across dataframe libraries. Ibis is a Narwhals lazy-only backend"

  - concept_a: "ibis:backend-portability"
    concept_b: "substrait:query-plan-spec"
    type: "see-also"
    note: "Both enable cross-engine interop — Ibis via API portability, Substrait via serialized query plan interchange"

  # === String Expressions (4-way) ===
  - concept_a: "polars:string-expressions"
    concept_b: "ibis:string-expressions"
    type: "see-also"
    note: "Both provide string manipulation methods on column expressions — upper, lower, contains, replace, etc."

  - concept_a: "polars:string-expressions"
    concept_b: "narwhals:string-expressions"
    type: "see-also"
    note: "Narwhals string namespace mirrors Polars .str accessor for cross-backend string operations"

  - concept_a: "polars:string-expressions"
    concept_b: "substrait:scalar-functions"
    type: "see-also"
    note: "Substrait scalar-functions includes string function definitions (substring, concat, like, etc.)"

  - concept_a: "ibis:string-expressions"
    concept_b: "narwhals:string-expressions"
    type: "see-also"
    note: "Both abstract string operations across backends — Ibis via SQL compilation, Narwhals via dataframe-agnostic API"

  - concept_a: "ibis:string-expressions"
    concept_b: "substrait:scalar-functions"
    type: "see-also"
    note: "Ibis string expressions map to Substrait scalar string function definitions"

  # === Temporal Expressions (4-way) ===
  - concept_a: "polars:temporal-expressions"
    concept_b: "ibis:temporal-expressions"
    type: "see-also"
    note: "Both provide datetime extraction, arithmetic, and truncation on column expressions"

  - concept_a: "polars:temporal-expressions"
    concept_b: "narwhals:temporal-expressions"
    type: "see-also"
    note: "Narwhals temporal namespace mirrors Polars .dt accessor for cross-backend datetime operations"

  - concept_a: "polars:temporal-expressions"
    concept_b: "substrait:scalar-functions"
    type: "see-also"
    note: "Substrait scalar-functions includes datetime function definitions (extract, add, diff, etc.)"

  - concept_a: "ibis:temporal-expressions"
    concept_b: "narwhals:temporal-expressions"
    type: "see-also"
    note: "Both abstract temporal operations across backends — Ibis via SQL compilation, Narwhals via dataframe-agnostic API"

  - concept_a: "ibis:temporal-expressions"
    concept_b: "substrait:scalar-functions"
    type: "see-also"
    note: "Ibis temporal expressions map to Substrait scalar datetime function definitions"

  # === Null Handling (3-way) ===
  - concept_a: "polars:null-handling"
    concept_b: "narwhals:null-handling"
    type: "see-also"
    note: "Both provide null detection (is_null) and replacement (fill_null) on column expressions"

  - concept_a: "polars:null-handling"
    concept_b: "ibis:generic-expressions"
    type: "see-also"
    note: "Ibis null/coalesce operations live in generic-expressions; Polars has dedicated null-handling methods"

  - concept_a: "narwhals:null-handling"
    concept_b: "ibis:generic-expressions"
    type: "see-also"
    note: "Ibis null/coalesce operations live in generic-expressions; Narwhals has dedicated null-handling methods"

  # === Collection Expressions (3-way) ===
  - concept_a: "polars:collection-expressions"
    concept_b: "ibis:collection-expressions"
    type: "see-also"
    note: "Both provide operations on array/list and struct/map column types"

  - concept_a: "polars:collection-expressions"
    concept_b: "narwhals:collection-expressions"
    type: "see-also"
    note: "Both provide list/array operations on nested column types"

  - concept_a: "ibis:collection-expressions"
    concept_b: "narwhals:collection-expressions"
    type: "see-also"
    note: "Both abstract collection operations (arrays, maps) across backends"

  # === Aggregation (3-way) ===
  - concept_a: "polars:aggregation-expressions"
    concept_b: "ibis:table-expressions"
    type: "see-also"
    note: "Ibis aggregation is performed on Table expressions; Polars has dedicated aggregation expression methods"

  - concept_a: "polars:aggregation-expressions"
    concept_b: "substrait:aggregate-functions"
    type: "see-also"
    note: "Polars aggregation methods map to Substrait aggregate function definitions (sum, count, avg, etc.)"

  - concept_a: "ibis:table-expressions"
    concept_b: "substrait:aggregate-functions"
    type: "see-also"
    note: "Ibis Table.aggregate() compiles to Substrait AggregateRel with aggregate function references"

  # === Window Functions (3-way) ===
  - concept_a: "polars:window-expressions"
    concept_b: "ibis:table-expressions"
    type: "see-also"
    note: "Ibis window functions are expressed on Table expressions; Polars uses .over() on column expressions"

  - concept_a: "polars:window-expressions"
    concept_b: "substrait:window-functions"
    type: "see-also"
    note: "Polars .over() window expressions map to Substrait window function definitions"

  - concept_a: "ibis:table-expressions"
    concept_b: "substrait:window-functions"
    type: "see-also"
    note: "Ibis window expressions on Tables compile to Substrait WindowRel with window function references"

  # === Casting (2-way) ===
  - concept_a: "polars:casting-expressions"
    concept_b: "substrait:specialized-expressions"
    type: "see-also"
    note: "Substrait cast is a specialized expression type; Polars provides .cast() on column expressions"

  # === Numeric / Arithmetic Expressions (3-way) ===
  - concept_a: "ibis:numeric-expressions"
    concept_b: "polars:expressions"
    type: "see-also"
    note: "Ibis separates numeric operations into NumericValue/IntegerValue; Polars includes arithmetic in the general Expr class"

  - concept_a: "ibis:numeric-expressions"
    concept_b: "narwhals:expression-methods"
    type: "see-also"
    note: "Both provide arithmetic and comparison methods on column expressions"

  - concept_a: "ibis:numeric-expressions"
    concept_b: "substrait:scalar-functions"
    type: "see-also"
    note: "Ibis numeric operations map to Substrait arithmetic scalar function definitions"

  # === Expression Methods / Core (2-way) ===
  - concept_a: "narwhals:expression-methods"
    concept_b: "polars:expressions"
    type: "see-also"
    note: "Narwhals core Expr methods (arithmetic, comparisons, aggregations) mirror Polars expression API"

  - concept_a: "narwhals:expression-methods"
    concept_b: "substrait:expressions"
    type: "see-also"
    note: "Narwhals expression methods implement operations defined at the Substrait expression level"

  # === Name Expressions ===
  - concept_a: "narwhals:name-expressions"
    concept_b: "polars:expressions"
    type: "see-also"
    note: "Polars also has .name namespace (keep, map, prefix, suffix); Narwhals mirrors this for cross-backend column renaming"

  # === Field References (3-way) ===
  - concept_a: "substrait:field-references"
    concept_b: "polars:expressions"
    type: "see-also"
    note: "Polars col() creates column references; Substrait FieldReference is the formal IR equivalent"

  - concept_a: "substrait:field-references"
    concept_b: "ibis:expression-api"
    type: "see-also"
    note: "Ibis table column access creates references; Substrait FieldReference is the formal IR equivalent"

  - concept_a: "substrait:field-references"
    concept_b: "narwhals:expression-model"
    type: "see-also"
    note: "Narwhals col() creates column references; Substrait FieldReference is the formal IR equivalent"

  # === Function Library (2-way) ===
  - concept_a: "substrait:function-library"
    concept_b: "polars:expressions"
    type: "see-also"
    note: "Substrait function library YAMLs define the standard functions that Polars expressions implement"

  - concept_a: "substrait:function-library"
    concept_b: "ibis:expression-api"
    type: "see-also"
    note: "Substrait function library YAMLs define the standard functions that Ibis expressions compile to"

  # === Serialization ===
  - concept_a: "substrait:serialization"
    concept_b: "ibis:backend-portability"
    type: "see-also"
    note: "Ibis can produce Substrait serialized plans for cross-engine portability"

  # === Migration (2-way) ===
  - concept_a: "polars:migration"
    concept_b: "ibis:migration"
    type: "see-also"
    note: "Both provide migration guides from pandas/SQL; Polars from pandas/Spark, Ibis from pandas/SQL/dplyr"

  # === IO / Backend ===
  - concept_a: "polars:io-operations"
    concept_b: "ibis:backend-portability"
    type: "see-also"
    note: "Polars handles IO directly; Ibis delegates IO to backends (DuckDB reads Parquet, BigQuery reads tables, etc.)"

  # === GPU / Distributed ===
  - concept_a: "polars:gpu-acceleration"
    concept_b: "ibis:backend-portability"
    type: "see-also"
    note: "Polars GPU engine is a compute backend; Ibis achieves GPU compute through GPU-enabled backends like RAPIDS/cuDF"

  - concept_a: "polars:on-premises-deployment"
    concept_b: "ibis:backend-portability"
    type: "see-also"
    note: "Polars Cloud supports on-premises deployment; Ibis backends can run on-premises (DuckDB, Postgres, etc.)"

  # === Visualization ===
  - concept_a: "ibis:visualization"
    concept_b: "polars:io-operations"
    type: "see-also"
    note: "Both are output-oriented — Ibis integrates with plotting libraries, Polars provides data export for visualization pipelines"

  # === Narwhals Meta Concepts ===
  - concept_a: "narwhals:backwards-compatibility"
    concept_b: "ibis:backend-portability"
    type: "see-also"
    note: "Both address stability — Narwhals via Rust-editions-inspired versioning, Ibis via stable cross-backend API"

  - concept_a: "narwhals:behavioral-concepts"
    concept_b: "ibis:generic-expressions"
    type: "see-also"
    note: "Both deal with cross-backend behavioral differences — null semantics, ordering, boolean ops"

  - concept_a: "narwhals:api-completeness"
    concept_b: "ibis:backend-portability"
    type: "see-also"
    note: "Both track which operations are available across backends — Narwhals via support matrices, Ibis via backend operation tables"

