# Pre-merge validation workflow
name: Validate Main Release PR - Build Dependencies

on:
  pull_request:
    branches:
      - "main"

jobs:
  main-release-build-dependencies:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.12"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Install Build Tools
        run: |
          pip install hatchling hatch

      - name: Build Package
        run: |
          python -m hatchling build

      - name: Validate Package
        run: |
          pip install twine
          twine check dist/*

      - name: Test Install
        run: |
          pip install dist/mountainash-*.whl
          python -c "import mountainash as ma; print('Version:', ma.__version__); print('OK')"
